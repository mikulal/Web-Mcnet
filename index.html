  <style>
    .hero-wrap { position: relative; z-index: 1; }
    .hero-inner { max-width: var(--max); margin: 0 auto; padding: 64px 48px 0; }
    .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--blue); margin-bottom: 24px; }
    .eyebrow-line { width: 24px; height: 1px; background: var(--blue); }
    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(.7);} }
    .headline { font-family: 'Syne', sans-serif; font-size: clamp(32px, 4vw, 54px); font-weight: 800; line-height: 1.08; letter-spacing: -.02em; color: var(--cream); margin-bottom: 20px; }
    .headline .accent { color: var(--blue); position: relative; display: inline-block; }
    .headline .accent::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 100%; height: 2px; background: var(--blue); opacity: .35; transform: scaleX(0); transform-origin: left; animation: lineIn .6s .9s ease forwards; }
    @keyframes lineIn { to { transform: scaleX(1); } }
    .subline { font-size: 15px; font-weight: 400; line-height: 1.75; color: var(--muted); max-width: 500px; margin-bottom: 36px; }
    .hero-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 60px; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--dimmer); padding: 36px 0 52px; }
    .stat { padding-right: 36px; border-right: 1px solid var(--dimmer); }
    .stat:last-child { border-right: none; padding-left: 36px; padding-right: 0; }
    .stat:nth-child(2) { padding-left: 36px; }
    .stat-n { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--cream); line-height: 1; letter-spacing: -.02em; white-space: nowrap; }
    .stat-n sup { font-size: 16px; color: var(--blue); vertical-align: super; font-weight: 700; }
    .stat-l { font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    .stat-d { font-size: 11px; font-weight: 400; color: rgba(245,242,236,.28); margin-top: 2px; }
    @media(max-width:960px){
      .hero-inner{padding:40px 20px 0;}
      .stats{grid-template-columns:1fr;}
      .stat{border-right:none;padding:14px 0;border-bottom:1px solid var(--dimmer);}
      .stat:last-child{border-bottom:none;}
      .stat-n{font-size:30px;}
    }
  </style>
